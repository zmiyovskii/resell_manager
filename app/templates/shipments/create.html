{% extends "base.html" %}

{% block title %}Додати shipment{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <p class="page-kicker">Відправки</p>
        <h2 class="page-title">Додати shipment</h2>
        <p class="page-subtitle">Створення нової партії або відправки.</p>
    </div>
</div>

<section class="section-block">
    <div class="form-card">
        <form method="post" action="/web/shipments/create" class="form-grid">
            <div class="form-group">
                <label>Код</label>
                <input type="text" name="code" placeholder="SH-001" required>
            </div>

            <div class="form-group">
                <label>Перевізник</label>
                <input type="text" name="carrier_name" placeholder="DHL / Nova Poshta / Bus">
            </div>

            <div class="form-group">
                <label>Дата створення</label>
                <input type="date" name="created_date" required>
            </div>

            <div class="form-group">
                <label>Дата відправки</label>
                <input type="date" name="sent_date">
            </div>

            <div class="form-group">
                <label>Дата прибуття</label>
                <input type="date" name="arrival_date">
            </div>

            <div class="form-group">
                <label>Трек номер</label>
                <input type="text" name="tracking_number">
            </div>

            <div class="form-group">
                <label>Статус</label>
                <select name="status" required>
                    <option value="collecting">collecting</option>
                    <option value="sent">sent</option>
                    <option value="in_transit">in_transit</option>
                    <option value="arrived">arrived</option>
                    <option value="closed">closed</option>
                    <option value="problem">problem</option>
                </select>
            </div>

            <div class="form-group">
                <label>Default carrier fee</label>
                <input type="number" step="0.01" name="default_carrier_fee" value="10" required>
            </div>

            <div class="form-group full-width">
                <label>Нотатка</label>
                <textarea name="note" rows="3"></textarea>
            </div>

            <div class="form-actions full-width">
                <button type="submit" class="btn btn-primary">Створити shipment</button>
                <a href="/web/shipments" class="btn btn-secondary">Назад</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
